<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Keepy-Uppy King</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="rotate-prompt">
    <span class="rotate-icon">📱</span>
    <p>ROTATE YOUR DEVICE</p>
    <small>Keepy-Uppy King plays in landscape</small>
  </div>
  <main class="arcade-shell">
    <div class="cabinet-top">KEEPY-UPPY KING</div>
    <canvas id="game" width="480" height="270" aria-label="Keepy-Uppy King retro football game"></canvas>
    <div class="controls-hint">Tap / Space = kick • ← → = help player shuffle • Keep it up!</div>
  </main>
  <script src="game.js"></script>
</body>
</html>
